name: Deploy Travel Stack to ECR

on:
  push:
    branches:
      - master
    paths:
      - 'TRAVEL-LANGGRAPH-AGENT/**'
  workflow_dispatch: 

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Define both services here to run in parallel
        service: [langgraph-agent, chat-assistant]
        include:
          - service: langgraph-agent
            repo: langgraph-agent
          - service: chat-assistant
            repo: chat-assistant-ui

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push ${{ matrix.service }}
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ matrix.repo }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Navigate to the specific service directory
          cd TRAVEL-LANGGRAPH-AGENT/${{ matrix.service }}
          
          # Build and tag
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          
          # Push to ECR
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest